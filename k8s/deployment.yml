apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockalert
  namespace: stockalert
  labels:
    app: stockalert
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: stockalert
  template:
    metadata:
      labels:
        app: stockalert
    spec:
      containers:
        - name: stockalert
          image: docker.io/nunofernandes777/stockalert:v1.0.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: stockalert-config
            - secretRef:
                name: stockalert-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
